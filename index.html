<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fafafa; }
        nav { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .cart-section { background: #fff; padding: 20px; margin-top: 30px; border-top: 3px solid #007bff; }
        .logout { background: #dc3545; }
    </style>
</head>
<body>
    <nav>
        <span id="welcome">Book Store</span>
        <button class="logout" onclick="location.href='index.html'">Logout</button>
    </nav>

    <div class="container">
        
        <h2>Login</h2>
        <form onsubmit="login(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="message"></p>
    </div>



    <script>
         function login(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'admin123') {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('username', username);
                window.location.href = 'admin.html';
            } else if(username==='user' && password==='user123'){
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    window.location.href = 'user.html';
                }
                else {
                    document.getElementById('message').innerText = 'Invalid credentials. Use proper';
                }
        }






    </script>
</body>
</html>
